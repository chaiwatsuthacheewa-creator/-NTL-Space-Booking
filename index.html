<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTL ระบบจองพื้นที่ส่วนกลาง</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { 
      darkMode: 'class', 
      theme: { 
        extend: { 
          fontFamily: { sans: ['Prompt', 'sans-serif'] }
        } 
      } 
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; pointer-events: none; }
    body { transition: background 0.5s ease; min-height: 100vh; background-color: #f8fafc; }
    body.dark { background-color: #020617; color: white; }

    /* 📱 Dashboard Layout */
    .dashboard-container { max-width: 1600px; margin: 0 auto; width: 100%; }
    @media (min-width: 1280px) { .dashboard-container { aspect-ratio: 16 / 9; min-height: 850px; } }

    .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
    .dark .glass { background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }

    /* 🌈 Calendar Styling */
    .fc { border-radius: 2rem !important; overflow: hidden; background: white; padding: 1.5rem; border: none !important; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
    .dark .fc { background: #1e293b; color: white; border: 1px solid #334155 !important; }
    .fc-event { border: none !important; padding: 4px 8px !important; border-radius: 8px !important; font-weight: 600; cursor: pointer; }
    
    /* Neon Header Colors */
    .fc-col-header-cell.fc-day-sun { color: #ef4444; } .fc-col-header-cell.fc-day-mon { color: #eab308; }
    .fc-col-header-cell.fc-day-tue { color: #ec4899; } .fc-col-header-cell.fc-day-wed { color: #22c55e; }
    .fc-col-header-cell.fc-day-thu { color: #f97316; } .fc-col-header-cell.fc-day-fri { color: #3b82f6; }
    .fc-col-header-cell.fc-day-sat { color: #a855f7; }

    .nav-active { background: #3b82f6 !important; color: white !important; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4); }
    
    /* 🖼️ Fixed Upload Zone */
    .upload-zone { border: 3px dashed #cbd5e1; border-radius: 2rem; position: relative; cursor: pointer; transition: 0.3s; }
    .upload-zone:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
    
    .entrance-anim { animation: fadeInUp 0.6s ease-out both; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="light text-slate-800 antialiased selection:bg-blue-500/20">

  <canvas id="bg-canvas"></canvas>

  <nav class="sticky top-0 z-50 no-print border-b border-slate-200/50 dark:border-white/5 bg-white/70 dark:bg-slate-900/70 backdrop-blur-2xl transition-all">
    <div class="max-w-[1600px] mx-auto px-6 h-20 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
        </div>
        <div>
          <h1 class="text-xl font-black tracking-tighter dark:text-white italic uppercase">NTL SPACE SYSTEM</h1>
        </div>
      </div>
      
      <div class="flex items-center gap-4">
        <div class="flex glass p-1.5 rounded-2xl gap-1">
          <button onclick="switchView('calendar')" id="navCalendar" class="px-5 py-2 rounded-xl text-sm font-bold nav-active transition-all">🗓️ ปฏิทิน</button>
          <button onclick="switchView('analytics')" id="navAnalytics" class="px-5 py-2 rounded-xl text-sm font-medium dark:text-slate-400 transition-all">📊 สถิติ</button>
          <button onclick="switchView('form')" id="navForm" class="px-5 py-2 rounded-xl text-sm font-medium dark:text-slate-400 transition-all">➕ จองใหม่</button>
        </div>
        <button onclick="toggleDarkMode()" id="modeToggle" class="w-11 h-11 glass rounded-xl flex items-center justify-center hover:scale-105 transition-all text-xl">🌙</button>
      </div>
    </div>
  </nav>

  <main class="dashboard-container px-6 py-8">
    
    <div id="calendarView" class="h-full flex flex-col gap-6 animate-fade-in">
      <div class="flex justify-between items-end">
        <div class="entrance-anim">
          <h2 class="text-4xl font-black dark:text-white tracking-tighter border-l-8 border-blue-600 pl-4">Booking Schedule</h2>
          <p id="lastUpdatedText" class="text-slate-500 font-bold text-xs mt-2 uppercase"></p>
        </div>
        <div class="flex gap-3 entrance-anim">
          <span class="glass px-4 py-2 rounded-xl text-[10px] font-black dark:text-white uppercase border-b-4 border-blue-500 shadow-sm">Ari Hills</span>
          <span class="glass px-4 py-2 rounded-xl text-[10px] font-black dark:text-white uppercase border-b-4 border-orange-500 shadow-sm">KSL Tower</span>
        </div>
      </div>
      <div class="flex-1 min-h-0 entrance-anim" style="animation-delay: 0.2s"><div id='calendar' class="h-full"></div></div>
    </div>

    <div id="analyticsView" class="hidden h-full flex flex-col gap-8 animate-fade-in">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <div onclick="showAnalyticsDetails('Total')" class="glass p-8 rounded-[2.5rem] cursor-pointer hover:scale-[1.02] transition-all group entrance-anim">
          <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest">การจองเดือนนี้</p>
          <p class="text-6xl font-black dark:text-white mt-2 group-hover:text-blue-600" id="statMonthTotal">0</p>
        </div>
        <div onclick="showAnalyticsDetails('Ari Hills')" class="glass p-8 rounded-[2.5rem] border-l-[10px] border-blue-600 cursor-pointer hover:scale-[1.02] transition-all entrance-anim" style="animation-delay: 0.1s">
          <p class="text-blue-600 font-bold text-[10px] uppercase">Ari Hills</p>
          <p class="text-6xl font-black dark:text-white mt-2" id="statMonthAri">0</p>
        </div>
        <div onclick="showAnalyticsDetails('KSL Tower')" class="glass p-8 rounded-[2.5rem] border-l-[10px] border-orange-500 cursor-pointer hover:scale-[1.02] transition-all entrance-anim" style="animation-delay: 0.2s">
          <p class="text-orange-500 font-bold text-[10px] uppercase">KSL Tower</p>
          <p class="text-6xl font-black dark:text-white mt-2" id="statMonthKsl">0</p>
        </div>
        <div class="glass p-8 rounded-[2.5rem] bg-blue-600/5 dark:bg-blue-600/10 entrance-anim" style="animation-delay: 0.3s">
          <p class="text-slate-400 font-bold text-[10px] uppercase">Trend 30 Days</p>
          <p class="text-6xl font-black text-blue-500 mt-2" id="stat30Days">0</p>
        </div>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-3 flex-1 gap-8">
        <div class="lg:col-span-2 glass p-8 rounded-[3rem] h-[400px] entrance-anim" style="animation-delay: 0.4s"><canvas id="smartBarChart"></canvas></div>
        <div class="glass p-8 rounded-[3rem] h-[400px] flex items-center justify-center entrance-anim" style="animation-delay: 0.5s"><canvas id="smartDonutChart"></canvas></div>
      </div>
    </div>

    <div id="formView" class="hidden h-full animate-fade-in max-w-5xl mx-auto">
      <div class="glass p-10 md:p-16 rounded-[4rem] border-t-[12px] border-blue-600 relative overflow-hidden">
        <h2 class="text-4xl font-black dark:text-white mb-10 tracking-tighter italic">📝 บันทึกข้อมูลการจองพื้นที่</h2>
        
        <form id="bookingForm" onsubmit="handleFormSubmit(event)" class="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-6 relative z-10">
          <div class="col-span-full bg-slate-100/50 dark:bg-white/5 p-8 rounded-3xl border dark:border-white/10" id="ticketIdContainer">
            <label class="block text-[10px] font-black text-blue-500 mb-2 uppercase tracking-[0.2em]">Ticket ID Reference *</label>
            <input type="text" id="ticketId" required placeholder="เช่น P26040001" class="w-full bg-transparent border-none text-4xl font-black dark:text-white focus:ring-0 placeholder:opacity-20 italic">
          </div>
          
          <div class="space-y-2"><label class="font-bold text-slate-500 ml-1 text-xs uppercase">📍 เลือกอาคาร</label><select id="building" required class="w-full p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 dark:text-white outline-none focus:ring-2 focus:ring-blue-500"><option value="" disabled selected>กรุณาเลือกอาคาร...</option><option value="Ari Hills">Ari Hills</option><option value="KSL Tower">KSL Tower</option></select></div>
          <div class="space-y-2"><label class="font-bold text-slate-500 ml-1 text-xs uppercase">🗓️ วันที่ใช้งาน</label><input type="text" id="bookingDate" required placeholder="คลิกเลือกจากปฏิทิน" class="w-full p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 dark:text-white font-black cursor-pointer"></div>
          
          <div class="space-y-2"><label class="font-bold text-slate-500 ml-1 text-xs uppercase">⏰ เวลาเริ่ม</label><input type="text" id="startTime" required placeholder="เช่น 09:00" class="w-full p-4 rounded-2xl bg-white dark:bg-slate-900 border text-center font-black text-2xl dark:text-white"></div>
          <div class="space-y-2"><label class="font-bold text-slate-500 ml-1 text-xs uppercase">⏳ เวลาสิ้นสุด</label><input type="text" id="endTime" required placeholder="เช่น 12:00" class="w-full p-4 rounded-2xl bg-white dark:bg-slate-900 border text-center font-black text-2xl dark:text-white"></div>

          <div class="col-span-full space-y-2"><label class="font-bold text-slate-500 ml-1 text-xs uppercase">🎯 ชื่อกิจกรรม / หัวข้อประชุม</label><input type="text" id="eventName" required placeholder="เช่น NTL Culture Bootcamp Q2/2026" class="w-full p-4 rounded-2xl bg-white dark:bg-slate-900 border dark:text-white font-bold"></div>
          <div class="col-span-full space-y-2"><label class="font-bold text-slate-500 ml-1 text-xs uppercase">🛋️ รายละเอียดรูปแบบพื้นที่</label><textarea id="layout" rows="2" required placeholder="เช่น จัดแบบ Theater 50 ที่นั่ง, มีเครื่องเสียง..." class="w-full p-4 rounded-2xl bg-white dark:bg-slate-900 border dark:text-white font-medium"></textarea></div>

          <div class="col-span-full">
            <label class="font-bold text-slate-500 ml-1 text-xs uppercase block mb-2">🖼️ แผนผังการจัดพื้นที่ (JPG/PNG)</label>
            <div onclick="document.getElementById('fileUpload').click()" class="upload-zone p-8 text-center bg-white/40 dark:bg-slate-900/40">
              <span class="text-3xl block mb-2">📁</span>
              <p class="text-slate-400 font-bold text-sm">คลิกเพื่อเลือกไฟล์รูปภาพแปลน</p>
              <input type="file" id="fileUpload" accept="image/*" onchange="showFileName(this)" class="hidden">
              <div id="fileNameDisplay" class="hidden mt-4 bg-emerald-50 dark:bg-emerald-900/20 p-3 rounded-xl text-emerald-600 dark:text-emerald-400 font-bold text-xs border border-emerald-100">✅ <span id="fileNameText"></span></div>
            </div>
          </div>

          <div class="col-span-1 space-y-1"><label class="font-bold text-slate-500 text-[10px] uppercase">👤 ผู้ติดต่อ</label><input type="text" id="contactName" required placeholder="คุณเบียร์ (สถาพร)" class="w-full p-4 rounded-xl bg-white dark:bg-slate-900 border"></div>
          <div class="col-span-1 space-y-1"><label class="font-bold text-slate-500 text-[10px] uppercase">📞 เบอร์โทร</label><input type="text" id="contactPhone" required placeholder="08x-xxx-xxxx" class="w-full p-4 rounded-xl bg-white dark:bg-slate-900 border"></div>

          <div class="col-span-full pt-8">
            <button type="submit" id="submitBtn" class="w-full py-7 bg-blue-600 text-white rounded-[2.5rem] font-black text-2xl shadow-2xl shadow-blue-500/40 hover:scale-[1.01] active:scale-95 transition-all italic uppercase">CONFIRM BOOKING 🚀</button>
            <button type="button" id="cancelEditBtn" onclick="resetFormToCreate()" class="hidden w-full mt-4 text-slate-400 font-bold">ยกเลิกการแก้ไข</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <div id="detailsModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-xl" onclick="closeModal()"></div>
    <div class="glass w-full max-w-6xl rounded-[3.5rem] shadow-2xl relative flex flex-col max-h-[85vh] overflow-hidden border-8 border-white dark:border-slate-800 animate-fade-in">
      <div class="p-8 border-b flex justify-between items-center bg-slate-50 dark:bg-slate-900/50">
        <div><h3 class="text-3xl font-black dark:text-white italic tracking-tighter"><span id="modalDateTitle" class="text-blue-600 font-black">รายละเอียด</span></h3></div>
        <button onclick="closeModal()" class="w-14 h-14 rounded-full bg-slate-200 dark:bg-slate-800 text-slate-400 hover:text-red-500 flex items-center justify-center text-4xl transition-all">&times;</button>
      </div>
      <div class="flex border-b text-lg font-black bg-white dark:bg-slate-900">
        <button onclick="switchTab('Ari Hills')" id="tabAri" class="flex-1 py-6 border-b-8 border-blue-600 text-blue-600 bg-blue-50/20 transition-all font-black">📍 ARI HILLS</button>
        <button onclick="switchTab('KSL Tower')" id="tabKsl" class="flex-1 py-6 border-b-8 border-transparent text-slate-400 transition-all font-bold">📍 KSL TOWER</button>
      </div>
      <div id="modalContent" class="p-8 overflow-y-auto space-y-8 flex-1 hide-scrollbar bg-slate-50/50 dark:bg-slate-900/50 grid grid-cols-1 lg:grid-cols-2 gap-6 items-start"></div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz1z-ya_HeQxAvUx4wYaXwba2VEtxJZizUabpVn9pl6EBJx-G5_4ygZmUXvPdAD9Fbv/exec";

    let globalBookingData = [], calendar, donutChartInstance, barChartInstance, currentModalEvents = [];
    window.currentAction = 'create'; window.currentOldImage = '';

    // 🎨 IT Background Animation
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let points = [];
    function initCanvas() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        points = [];
        for(let i=0; i<60; i++) points.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5 });
    }
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const isDark = document.body.classList.contains('dark');
        ctx.strokeStyle = isDark ? 'rgba(59, 130, 246, 0.1)' : 'rgba(59, 130, 246, 0.08)';
        ctx.lineWidth = 1;
        points.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy;
            if(p.x < 0 || p.x > canvas.width) p.vx *= -1; if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
            points.slice(i+1).forEach(p2 => {
                let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                if(dist < 200) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
            });
        });
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', initCanvas); initCanvas(); draw();

    function toggleDarkMode() {
      const isDark = document.body.classList.toggle('dark');
      document.body.classList.toggle('light', !isDark);
      document.documentElement.classList.toggle('dark', isDark);
      document.getElementById('modeToggle').innerHTML = isDark ? '☀️' : '🌙';
      if(calendar) calendar.render();
      if(barChartInstance) renderCharts();
    }

    function switchView(view) {
      ['calendarView', 'analyticsView', 'formView'].forEach(v => document.getElementById(v).classList.add('hidden'));
      document.getElementById(view + 'View').classList.remove('hidden');
      const navs = { calendar: 'navCalendar', analytics: 'navAnalytics', form: 'navForm' };
      Object.values(navs).forEach(id => document.getElementById(id).className = "px-5 py-2 rounded-xl text-sm font-medium text-slate-400 dark:text-slate-500 cursor-pointer transition-all");
      if(navs[view]) document.getElementById(navs[view]).className = "px-5 py-2 rounded-xl text-sm font-bold nav-active cursor-pointer";
      if(view === 'calendar' && calendar) { setTimeout(() => calendar.render(), 100); }
      if(view === 'analytics') renderCharts();
    }

    function showAnalyticsDetails(filter) {
        const now = new Date(); const m = now.getMonth(); const y = now.getFullYear();
        let filteredData = globalBookingData.filter(d => {
            let iso = parseThaiDate(d.date); if(!iso) return false;
            let date = new Date(iso); return date.getMonth() === m && date.getFullYear() === y;
        });
        if (filter !== 'Total') filteredData = filteredData.filter(d => d.building === filter);
        if (filteredData.length === 0) { Swal.fire('No Records', 'ไม่พบข้อมูลการจองในเดือนนี้', 'info'); return; }
        document.getElementById('modalDateTitle').innerText = filter === 'Total' ? "Summary ประจำเดือน" : "Building: " + filter;
        currentModalEvents = filteredData;
        document.getElementById('detailsModal').classList.remove('hidden');
        switchTab(filter === 'Total' ? 'Ari Hills' : filter);
    }

    function fetchData(isInitialLoad = false) {
      fetch(WEB_APP_URL + "?action=getBookingData").then(res => res.json()).then(data => {
        globalBookingData = data; updateCalendar();
        document.getElementById('lastUpdatedText').innerHTML = "SYSTEM READY: " + new Date().toLocaleTimeString('th-TH');
        if(isInitialLoad) Swal.close();
      });
    }

    function updateCalendar() {
      let events = [];
      globalBookingData.forEach(d => {
        let iso = parseThaiDate(d.date);
        if(iso) { 
          let title = d.building;
          if(d.image && d.image.startsWith("http")) title += " [🖼️ แปลนภาพ]";
          events.push({ 
            title: title, start: iso, allDay: true, 
            color: d.building === 'Ari Hills' ? '#3b82f6' : '#f97316',
            extendedProps: { date: d.date, building: d.building } 
          }); 
        }
      });
      calendar.removeAllEvents(); calendar.addEventSource(events);
    }

    function switchTab(building) {
      const isAri = building === 'Ari Hills';
      document.getElementById('tabAri').className = isAri ? "flex-1 py-6 border-b-8 border-blue-600 text-blue-600 bg-blue-50/30 transition-all font-black" : "flex-1 py-6 border-b-8 border-transparent text-slate-400 hover:bg-slate-100 transition-all font-bold";
      document.getElementById('tabKsl').className = !isAri ? "flex-1 py-6 border-b-8 border-orange-500 text-orange-600 bg-orange-50/30 transition-all font-black" : "flex-1 py-6 border-b-8 border-transparent text-slate-400 hover:bg-slate-100 transition-all font-bold";
      const content = document.getElementById('modalContent');
      const events = currentModalEvents.filter(e => e.building === building).sort((a,b) => a.start.localeCompare(b.start));
      if(events.length === 0) { content.innerHTML = `<div class="col-span-full text-center py-20 opacity-20 text-2xl font-black italic">🍃 NO DATA RECORDED</div>`; return; }

      content.innerHTML = events.map(p => {
        const hasImg = p.image && p.image.startsWith("http");
        return `
        <div class="bg-white dark:bg-slate-800 p-8 rounded-[3rem] shadow-sm border border-slate-100 dark:border-white/5 relative group hover:shadow-xl transition-all">
          <div class="flex justify-between items-center mb-6">
            <span class="bg-slate-100 dark:bg-slate-900 dark:text-white px-5 py-2.5 rounded-2xl font-black italic text-lg tracking-tighter">⏰ ${p.start} - ${p.end}</span>
            <span class="text-[10px] font-black uppercase text-blue-500 border-2 border-blue-100 px-2 py-1 rounded-md">${p.status}</span>
          </div>
          <h4 class="font-black text-2xl text-slate-900 dark:text-white mb-4 leading-tight">${p.title}</h4>
          <p class="text-slate-500 dark:text-slate-400 font-bold text-sm mb-8 leading-relaxed">${p.layout}</p>
          <div class="grid grid-cols-2 gap-3">
            ${hasImg ? `<a href="${p.image}" target="_blank" class="bg-blue-50 dark:bg-blue-500/10 text-blue-700 dark:text-blue-400 text-center py-4 rounded-2xl font-black text-xs">VIEW PLAN</a>` : ''}
            <button onclick="editBooking('${p.id}')" class="bg-yellow-50 dark:bg-yellow-400/10 text-yellow-700 dark:text-yellow-400 py-4 rounded-2xl font-black text-xs">EDIT</button>
            <button onclick="deleteBooking('${p.id}')" class="bg-red-50 dark:bg-red-400/10 text-red-600 dark:text-red-400 py-4 rounded-2xl font-black text-xs">DELETE</button>
            <div id="maid-btn-area-${p.id}" class="col-span-full mt-2">
              ${p.maidStatus === 'Notified' 
                ? `<span class="w-full flex items-center justify-center bg-emerald-100 text-emerald-700 py-4 rounded-2xl font-black text-xs uppercase">Notified ✅</span>`
                : `<button onclick="notifyMaid('${p.id}')" class="w-full bg-slate-900 dark:bg-blue-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Notify Maid 🧹</button>`}
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function renderCharts() {
      const now = new Date(); const m = now.getMonth(); const y = now.getFullYear();
      const isDark = document.body.classList.contains('dark');
      const textColor = isDark ? '#94a3b8' : '#64748b';
      const thisMonthEvents = globalBookingData.filter(d => {
        let iso = parseThaiDate(d.date); if(!iso) return false;
        let eventDate = new Date(iso); return eventDate.getMonth() === m && eventDate.getFullYear() === y;
      });
      const ariMonth = thisMonthEvents.filter(d => d.building === 'Ari Hills').length;
      const kslMonth = thisMonthEvents.filter(d => d.building === 'KSL Tower').length;
      let dateCounts = {}; let thirtyDaysAgo = new Date(); thirtyDaysAgo.setDate(now.getDate() - 30);
      globalBookingData.forEach(d => {
        let iso = parseThaiDate(d.date); if(!iso) return;
        let eventDate = new Date(iso); if(eventDate >= thirtyDaysAgo && eventDate <= now) {
            let dateKey = eventDate.toISOString().split('T')[0]; dateCounts[dateKey] = (dateCounts[dateKey] || 0) + 1;
        }
      });
      document.getElementById('statMonthTotal').innerText = thisMonthEvents.length;
      document.getElementById('statMonthAri').innerText = ariMonth;
      document.getElementById('statMonthKsl').innerText = kslMonth;
      document.getElementById('stat30Days').innerText = thisMonthEvents.length;

      if(donutChartInstance) donutChartInstance.destroy();
      donutChartInstance = new Chart(document.getElementById('smartDonutChart').getContext('2d'), {
        type: 'doughnut', data: { labels: ['Ari Hills', 'KSL Tower'], datasets: [{ data: [ariMonth, kslMonth], backgroundColor: ['#3b82f6', '#f97316'], borderWeight: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '85%', plugins: { legend: { position: 'bottom', labels: { color: textColor, font: { family: 'Prompt', weight: 'bold' } } } } }
      });

      if(barChartInstance) barChartInstance.destroy();
      let sortedDates = Object.keys(dateCounts).sort();
      barChartInstance = new Chart(document.getElementById('smartBarChart').getContext('2d'), {
        type: 'line', data: { labels: sortedDates.map(d => { let date = new Date(d); return date.getDate() + "/" + (date.getMonth()+1); }), datasets: [{ label: 'Booking Volume', data: sortedDates.map(d => dateCounts[d]), borderColor: '#3b82f6', borderWidth: 6, tension: 0.4, fill: true, backgroundColor: 'rgba(59, 130, 246, 0.05)', pointRadius: 5, pointBackgroundColor: '#3b82f6' }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false }, ticks: { color: textColor } } } }
      });
    }

    function notifyMaid(id) {
      const area = document.getElementById(`maid-btn-area-${id}`);
      area.innerHTML = `<button disabled class="w-full bg-slate-100 text-slate-400 py-4 rounded-2xl font-black italic uppercase">Processing...</button>`;
      fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'notifyMaid', ticketId: id }) })
      .then(res => res.json()).then(res => { if(res.success) fetchData(false); });
    }

    function handleFormSubmit(event) {
      event.preventDefault(); document.getElementById('submitBtn').innerHTML = "⏳ Processing Request..."; document.getElementById('submitBtn').disabled = true;
      const file = document.getElementById('fileUpload').files[0];
      const formObject = { action: window.currentAction, ticketId: document.getElementById('ticketId').value, building: document.getElementById('building').value, bookingDate: document.getElementById('bookingDate').value, startTime: document.getElementById('startTime').value, endTime: document.getElementById('endTime').value, eventName: document.getElementById('eventName').value, layout: document.getElementById('layout').value, contactName: document.getElementById('contactName').value, contactPhone: document.getElementById('contactPhone').value, oldImage: window.currentOldImage };
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) { formObject.fileData = e.target.result; formObject.fileName = file.name; sendToBackend(formObject); };
        reader.readAsDataURL(file);
      } else { sendToBackend(formObject); }
    }

    function sendToBackend(formObject) {
      fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(formObject) }).then(res => res.json()).then(res => {
        document.getElementById('submitBtn').disabled = false; document.getElementById('submitBtn').innerHTML = "Confirm Booking 🚀";
        if(res.success) { resetFormToCreate(); fetchData(false); switchView('calendar'); Swal.fire('Success', 'บันทึกสำเร็จ!', 'success'); } else { Swal.fire('Error', res.message, 'error'); }
      });
    }

    function parseThaiDate(str) {
      if(!str) return null; const m = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
      try { let p = str.trim().split(' '); return (parseInt(p[2])-543) + "-" + (m.indexOf(p[1])+1).toString().padStart(2,'0') + "-" + p[0].padStart(2,'0'); } catch(e) { return null; }
    }
    function closeModal() { document.getElementById('detailsModal').classList.add('hidden'); }
    function editBooking(id) {
      const b = globalBookingData.find(x => x.id === id); if(!b) return; closeModal();
      document.getElementById('ticketId').value = b.id; document.getElementById('ticketId').readOnly = true;
      document.getElementById('building').value = b.building; document.getElementById('bookingDate').value = b.date; document.getElementById('startTime').value = b.start; document.getElementById('endTime').value = b.end; document.getElementById('eventName').value = b.title; document.getElementById('layout').value = b.layout; document.getElementById('contactName').value = b.contact; document.getElementById('contactPhone').value = b.phone;
      window.currentAction = 'update'; window.currentOldImage = b.image;
      document.getElementById('submitBtn').innerText = "SAVE CHANGES"; document.getElementById('cancelEditBtn').classList.remove('hidden'); switchView('form');
    }
    function deleteBooking(id) {
      Swal.fire({ title: 'Cancel Booking?', icon: 'warning', showCancelButton: true }).then((result) => {
        if (result.isConfirmed) { fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', ticketId: id }) }).then(res => res.json()).then(res => { if(res.success) { fetchData(); closeModal(); } }); }
      });
    }
    function resetFormToCreate() { document.getElementById('bookingForm').reset(); document.getElementById('ticketId').readOnly = false; window.currentAction = 'create'; document.getElementById('submitBtn').innerText = "Confirm Booking 🚀"; document.getElementById('cancelEditBtn').classList.add('hidden'); document.getElementById('fileNameDisplay').classList.add('hidden'); }
    function showFileName(input) { if(input.files[0]) { document.getElementById('fileNameText').innerText = input.files[0].name; document.getElementById('fileNameDisplay').classList.remove('hidden'); } }

    document.addEventListener('DOMContentLoaded', () => {
      flatpickr("#bookingDate", { locale: "th", dateFormat: "d F Y", onReady: function(s, ds, i) { const ms = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม']; i.formatDate = function(d, f) { return d.getDate() + " " + ms[d.getMonth()] + " " + (d.getFullYear() + 543); }; } });
      flatpickr("#startTime, #endTime", { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true });
      calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth', locale: 'th', height: 'auto',
        headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' },
        eventClick: (info) => {
          document.getElementById('modalDateTitle').innerText = info.event.extendedProps.date;
          currentModalEvents = globalBookingData.filter(d => d.date === info.event.extendedProps.date);
          document.getElementById('detailsModal').classList.remove('hidden'); switchTab(info.event.extendedProps.building);
        }
      });
      calendar.render(); fetchData(true); setInterval(() => fetchData(false), 30000);
    });
  </script>
</body>
</html>
